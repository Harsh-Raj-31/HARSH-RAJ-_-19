<!DOCTYPE html>
<html>
<head>
    <title>Change Div Color</title>
    <style>
        #myDiv {
            width: 200px;
            height: 200px;
            background-color: lightblue;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="myDiv"></div>
    <button onclick="changeColor()">Change Color</button>

    <script>
        function changeColor() {
            document.getElementById("myDiv").style.backgroundColor = "yellow";
        }
    </script>

</body>
</html>
