<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <style>
        /* ===== Global Font ===== */
        * {
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        /* ===== Page Background ===== */
        body {
            background: linear-gradient(
                rgba(0,0,0,0.45),
                rgba(0,0,0,0.45)
            ),
            url("image1.jpg");
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            margin: 0;
        }

        /* ===== Heading ===== */
        h1 {
            text-align: center;
            color: #00eaff;
            margin-top: 25px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px #000;
        }

        /* ===== Form Card ===== */
        form {
            width: 450px;
            margin: 25px auto;
            background: linear-gradient(
                135deg,
                rgba(255,255,255,0.95),
                rgba(230,245,255,0.95)
            );
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            animation: slideUp 1s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ===== Labels ===== */
        label {
            font-weight: 600;
            margin-top: 14px;
            display: block;
            color: #2c3e50;
            font-size: 15px;
        }

        /* ===== Inputs ===== */
        input,
        textarea,
        select {
            width: 100%;
            padding: 11px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid #bbb;
            font-size: 14px;
            transition: 0.3s;
        }

        input[type="date"] {
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        input:focus,
        textarea:focus,
        select:focus {
            border-color: #00b4db;
            box-shadow: 0 0 10px rgba(0,180,219,0.7);
            outline: none;
        }

        textarea {
            resize: none;
        }

        /* ===== Radio & Checkbox ===== */
        .options {
            margin-top: 6px;
            padding-left: 5px;
        }

        .options input {
            width: auto;
            margin-right: 6px;
            transform: scale(1.2);
        }

        .options label {
            display: inline-block;
            margin-right: 15px;
            font-weight: normal;
            font-size: 14px;
            color: #34495e;
        }

        /* ===== Buttons ===== */
        .buttons {
            text-align: center;
            margin-top: 30px;
        }

        input[type="submit"],
        input[type="reset"] {
            width: 170px;
            height: 52px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            color: white;
            margin: 8px;
            transition: 0.4s;
        }

        input[type="submit"] {
            background: linear-gradient(to right, #00b09b, #96c93d);
        }

        input[type="reset"] {
            background: linear-gradient(to right, #ff512f, #dd2476);
        }

        input[type="submit"]:hover,
        input[type="reset"]:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* ===== Mobile Responsive ===== */
        @media (max-width: 500px) {
            form {
                width: 90%;
            }
        }
    </style>
</head>
<body>

<h1>Student Registration Form</h1>

<form>

    <label>Name</label>
    <input type="text" placeholder="Enter your name" required>

    <label>Email</label>
    <input type="email" placeholder="Enter your email" required>

    <label>Password</label>
    <input type="password" placeholder="Enter password" required>

    <label>Gender</label>
    <div class="options">
        <label><input type="radio" name="gender" required> Male</label>
        <label><input type="radio" name="gender"> Female</label>
        <label><input type="radio" name="gender"> Other</label>
    </div>

    <label>Skills</label>
    <div class="options">
        <label><input type="checkbox"> HTML</label>
        <label><input type="checkbox"> CSS</label>
        <label><input type="checkbox"> JavaScript</label>
    </div>

    <label>City</label>
    <select required>
        <option value="">Select City</option>
        <option>Patna</option>
        <option>Bhagalpur</option>
        <option>Jehanabad</option>
        <option>Gaya</option>
    </select>

    <label>Date of Birth</label>
    <input type="date" required>

    <label>Mobile Number</label>
    <input type="text"
           placeholder="Enter 10 digit mobile number"
           maxlength="10"
           inputmode="numeric"
           onkeypress="return event.charCode >= 48 && event.charCode <= 57"
           oninput="this.value=this.value.replace(/[^0-9]/g,'')"
           required>

    <label>Address</label>
    <textarea rows="3" placeholder="Enter your address" required></textarea>

    <label>Course</label>
    <input type="text" placeholder="" required>

    <div class="buttons">
        <input type="submit" value="Register">
        <input type="reset" value="Reset">
    </div>

</form>

</body>
</html>
