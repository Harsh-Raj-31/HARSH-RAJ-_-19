<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Employee Validation Form</title>

<style>
    *{
        font-family: 'Segoe UI', Arial, sans-serif;
    }
    body{
        background:#eaf2f8;
    }
    form{
        width:400px;
        margin:60px auto;
        background:#fff;
        padding:30px;
        border-radius:12px;
        box-shadow:0 15px 30px rgba(0,0,0,0.3);
    }
    h2{
        text-align:center;
        color:#2c3e50;
    }
    label{
        font-weight:600;
        margin-top:15px;
        display:block;
    }
    input{
        width:100%;
        padding:10px;
        margin-top:6px;
        border-radius:6px;
        border:1px solid #bbb;
    }
    input[type="submit"]{
        margin-top:25px;
        background:#00b09b;
        color:white;
        font-size:16px;
        font-weight:bold;
        border:none;
        cursor:pointer;
    }
    input[type="submit"]:hover{
        background:#008f7a;
    }
</style>

<form>

    <label>Name</label>
    <input type="text" placeholder="Enter employee name" required>

    <label>Email</label>
    <input type="email" placeholder="Enter your email" required>
      

    <label>Password</label>
    <input type="password" placeholder="Enter password" required>
 <div class="buttons">
        <input type="submit" value="Register">
       
    </div>
