<!DOCTYPE html>
<html>
<head>
    <title>Input Alert</title>
</head>
<body>

    <input type="text" id="myInput" placeholder="Enter something">
    <button onclick="showAlert()">Submit</button>

    <script>
        function showAlert() {
            const value = document.getElementById("myInput").value;
            alert(value);
        }
    </script>

</body>
</html>
