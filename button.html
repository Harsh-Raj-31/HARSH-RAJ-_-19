<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Button Example</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to right, #141e30, #243b55);
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            color: #2c3e50;
        }

        .btn {
            margin-top: 20px;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            background: linear-gradient(to right, #00b09b, #96c93d);
            transition: 0.4s;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>HTML Button Demo</h1>

    <!-- Button -->
    <button class="btn" onclick="alert('Button Clicked Successfully!')">
        Click Me
    </button>
</div>

</body>
</html>
